<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Krishna Self Study Centre Admission Form</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        :root { --primary-color: #1a237e; --secondary-color: #424242; --border-color: #cfd8dc; --bg-color: #eceff1; --success-color: #28a745; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--secondary-color); }
        .container { max-width: 850px; margin: 0 auto; background-color: #fff; padding: 35px 45px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); border-radius: 8px; border-top: 6px solid var(--primary-color); }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 2px solid var(--primary-color); padding-bottom: 20px; }
        .header-text h1 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 28px; text-transform: uppercase; }
        .header-text p { margin: 3px 0; color: #555; font-size: 15px; }
        .hindi-address { font-weight: 500; font-size: 18px; color: var(--primary-color); }
        .form-title { text-align: center; font-size: 22px; font-weight: 700; margin: 25px 0; color: var(--primary-color); text-decoration: underline; }
        .section-header { background-color: var(--primary-color); color: white; padding: 10px 15px; font-size: 16px; margin-top: 30px; margin-bottom: 20px; border-radius: 4px; }
        .form-row { display: flex; flex-wrap: wrap; margin-bottom: 18px; justify-content: space-between; }
        .form-group { flex: 1 1 45%; margin-bottom: 15px; }
        .full-width { flex: 1 1 100%; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--primary-color); }
        .print-input { width: 100%; border: 1px solid var(--border-color); padding: 12px; font-size: 16px; border-radius: 4px; box-sizing: border-box; }
        .doc-box { background-color: #f0f4ff; padding: 20px; border-radius: 8px; border: 1px dashed #1a237e; margin-bottom: 20px; }
        .shift-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .shift-item { border: 1px solid var(--border-color); padding: 10px; border-radius: 20px; display: flex; align-items: center; background: #fff; cursor: pointer; }
        .submit-btn { width: 100%; padding: 15px; background-color: var(--success-color); color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        @media (max-width: 600px) { .container { padding: 15px; } .form-group { flex: 1 1 100%; } .header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-text">
            <h1>Shri Krishna Self Study Centre</h1>
            <p class="hindi-address">श्री राधा कृष्ण भवन</p>
            <p>Bhimapar, Saidpur, Ghazipur, UP - 233307</p>
            <p><strong>Contact:</strong> 9506262556, 9208762556</p>
        </div>
    </div>

    <div class="form-title">Online Admission Application</div>

    <form action="https://formsubmit.co/shri.krishna.self.study.center@gmail.com" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_subject" value="New Admission: Shri Krishna Centre">

        <div class="section-header">1. Personal Details</div>
        <div class="form-row">
            <div class="form-group full-width">
                <label>Full Name of Applicant *</label>
                <input type="text" name="Full Name" class="print-input" required>
            </div>
        </div>
        
        <div class="doc-box">
            <div class="form-row">
                <div class="form-group">
                    <label>Passport Photo *</label>
                    <input type="file" name="Student Photo" class="print-input" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Aadhaar Card *</label>
                    <input type="file" name="Aadhaar Card" class="print-input" accept="image/*,application/pdf" required>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Mobile (WhatsApp) *</label>
                <input type="tel" name="Mobile" class="print-input" required>
            </div>
            <div class="form-group">
                <label>Parent Mobile</label>
                <input type="tel" name="Parent Mobile" class="print-input">
            </div>
        </div>

        <div class="section-header">2. Study Details</div>
        <div class="form-row">
            <div class="form-group full-width">
                <label>Preferred Shift *</label>
                <div class="shift-options">
                    <label class="shift-item"><input type="radio" name="Shift" value="Morning" required> Morning</label>
                    <label class="shift-item"><input type="radio" name="Shift" value="Evening"> Evening</label>
                    <label class="shift-item"><input type="radio" name="Shift" value="Full Day"> Full Day</label>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Joining Date *</label>
                <input type="date" name="Joining Date" class="print-input" required>
            </div>
        </div>

        <button type="submit" class="submit-btn">Submit Application</button>
    </form>
</div>
</body>

</html>
